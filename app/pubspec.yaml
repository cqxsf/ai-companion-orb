name: ai_companion_orb
description: AI Companion Orb - 有温度的家庭IoT伴侣

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # BLE
  flutter_blue_plus: ^1.32.12

  # HTTP
  dio: ^5.4.3+1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.66.0
  shimmer: ^3.0.0

  # Audio
  just_audio: ^0.9.39
  record: ^5.1.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
